<script src="https://unpkg.com/flubber@0.3.0"></script>
<script>
class AudioEngine {
  constructor() {
    this.audioCtx = null;
    this.analyser = null;
    this.dataArray = null;
    this.smoothedLevel = 0;
    this.isRunning = false;
  }

  async start() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.audioCtx.state === 'suspended') await this.audioCtx.resume();
    const source = this.audioCtx.createMediaStreamSource(stream);
    this.analyser = this.audioCtx.createAnalyser();
    this.analyser.fftSize = 1024;
    source.connect(this.analyser);
    this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
    this.isRunning = true;
  }

  getLevel() {
    if (!this.isRunning) return 0;
    this.analyser.getByteTimeDomainData(this.dataArray);
    let sumSquares = 0;
    for (let i = 0; i < this.dataArray.length; i++) {
      const normalized = this.dataArray[i] / 128 - 1;
      sumSquares += normalized * normalized;
    }
    const rms = Math.sqrt(sumSquares / this.dataArray.length);
    const raw = Math.min(100, Math.max(0, (rms / 0.3) * 100));
    this.smoothedLevel = this.smoothedLevel * 0.7 + raw * 0.3;
    return this.smoothedLevel;
  }
}

class MorphController {
  constructor(svgEl) {
    this.svg = svgEl;
    this.interpolators = [];
    this.setupInterpolators();
  }

  setupInterpolators() {
    this.interpolators = [];
    const ids = ['pathCapelli', 'pathOcchio1', 'pathOcchio2', 'eyeWhite', 'eyeWhiteBottom', 'pathBocca2'];
    for (const id of ids) {
      const el = this.svg.querySelector('#' + id);
      const dQuiet = el.getAttribute('data-quiete');
      const dRumore = el.getAttribute('data-rumore');
      if (dQuiet && dRumore && dQuiet !== dRumore) {
        this.interpolators.push({
          el,
          morph: flubber.interpolate(dQuiet, dRumore, { maxSegmentLength: 2 }),
        });
      }
    }
  }

  update(t) {
    for (const { el, morph } of this.interpolators) {
      el.setAttribute('d', morph(t));
    }
  }
}

const svgEl = document.querySelector('svg');
const audioEngine = new AudioEngine();
const morph = new MorphController(svgEl);
const startBtn = document.getElementById('startBtn');
const slider = document.getElementById('levelSlider');
const levelLabel = document.getElementById('levelLabel');
const fallbackMsg = document.getElementById('fallbackMsg');
let useMicrophone = false;

const irideEl = document.getElementById('iride');
const pupillaEl = document.getElementById('pupilla');

function lerp(a, b, t) { return a + (b - a) * t; }

function animate() {
  const level = useMicrophone ? audioEngine.getLevel() : parseFloat(slider.value);
  const t = Math.min(1, Math.max(0, level / 100));

  morph.update(t);

  if (irideEl) {
    irideEl.setAttribute('ry', t * 18.7);
    irideEl.setAttribute('cy', lerp(379, 360.2, t));
  }
  if (pupillaEl) {
    pupillaEl.setAttribute('ry', t * 10.6);
    pupillaEl.setAttribute('cy', lerp(370.9, 360.2, t));
  }

  levelLabel.textContent = 'Livello: ' + Math.round(level);
  requestAnimationFrame(animate);
}

startBtn.addEventListener('click', async () => {
  try {
    await audioEngine.start();
    useMicrophone = true;
    startBtn.textContent = '✓ Microfono attivo';
    startBtn.disabled = true;
    slider.style.display = 'none';
    levelLabel.style.display = 'block';
  } catch {
    fallbackMsg.textContent = 'Microfono non disponibile — usa lo slider';
    slider.style.display = 'block';
    levelLabel.style.display = 'block';
    useMicrophone = false;
  }
});

slider.addEventListener('input', () => {
  if (!useMicrophone) {
    levelLabel.textContent = 'Livello: ' + Math.round(slider.value);
  }
});

animate();
</script>
<script src="../js/header.js"></script>
</body>
</html>
